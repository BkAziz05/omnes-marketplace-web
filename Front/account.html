<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- 
         account.html — Page Mon Compte
         Profil utilisateur avec formulaire de modification,
         informations du compte et historique des commandes.
     -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Compte — Omnes MarketPlace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar partagée -->
<script src="js/layout.js"></script>
<script>renderNavbar('');</script>

<!-- 
     EN-TÊTE PROFIL
     Bandeau coloré avec avatar initiales + nom + rôle.
 -->
<!-- Bandeau de couleur en arrière-plan du profil -->
<div style="height:160px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));"></div>

<div class="container" style="margin-top:-60px;position:relative;z-index:1;">
    <!-- Avatar + Nom + Badge rôle (superposés sur le bandeau) -->
    <div class="d-flex align-items-end gap-4 mb-5">
        <!-- Avatar circulaire avec icône personne -->
        <div style="width:100px;height:100px;border-radius:50%;background:white;box-shadow:0 4px 20px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;border:4px solid white;flex-shrink:0;">
            <i class="bi bi-person-fill" style="font-size:2.5rem;color:var(--primary);"></i>
        </div>
        <div class="pb-2">
            <!-- Nom complet de l'utilisateur -->
            <h2 style="font-family:'Playfair Display',serif;margin-bottom:4px;">Alice Dubois</h2>
            <!-- Badge rôle : Acheteur / Vendeur / Admin -->
            <span style="background:var(--primary-pale);color:var(--primary-dark);padding:3px 12px;border-radius:50px;font-size:.8rem;font-weight:700;text-transform:uppercase;"> Acheteur</span>
        </div>
    </div>

    <div class="row g-4">

        <!--  FORMULAIRE DE MODIFICATION DU PROFIL  -->
        <div class="col-lg-7">
            <div class="card-omnes p-4">
                <h5 style="font-family:'Playfair Display',serif;margin-bottom:20px;">Modifier mon profil</h5>
                <div class="row g-3">
                    <!-- Prénom et Nom -->
                    <div class="col-6">
                        <label class="form-label-omnes">Prénom *</label>
                        <input type="text" class="form-control-omnes" value="Alice">
                    </div>
                    <div class="col-6">
                        <label class="form-label-omnes">Nom *</label>
                        <input type="text" class="form-control-omnes" value="Dubois">
                    </div>
                    <!-- Adresse de livraison -->
                    <div class="col-12">
                        <label class="form-label-omnes">Adresse</label>
                        <textarea class="form-control-omnes" rows="2">15 Rue des Lilas, 75011 Paris</textarea>
                    </div>
                    <!-- Téléphone -->
                    <div class="col-12">
                        <label class="form-label-omnes">Téléphone</label>
                        <input type="tel" class="form-control-omnes" value="+33 6 12 34 56 78">
                    </div>

                    <!-- Séparateur section mot de passe -->
                    <div class="col-12">
                        <hr style="border-color:var(--border);">
                        <label class="form-label-omnes">Nouveau mot de passe</label>
                    </div>
                    <!-- Champs mot de passe + confirmation -->
                    <div class="col-6">
                        <input type="password" class="form-control-omnes" placeholder="Nouveau mot de passe">
                    </div>
                    <div class="col-6">
                        <input type="password" class="form-control-omnes" placeholder="Confirmer">
                    </div>
                </div>
                <!-- Bouton enregistrement (feedback visuel au clic) -->
                <button onclick="saveProfile()" class="btn-primary-omnes btn mt-4 px-4">
                    <i class="bi bi-check me-2"></i>Enregistrer
                </button>
            </div>
        </div>

        <!--  INFOS COMPTE + HISTORIQUE COMMANDES  -->
        <div class="col-lg-5">

            <!-- Informations du compte -->
            <div class="card-omnes p-4 mb-4">
                <h6 style="font-weight:700;margin-bottom:16px;">
                    <i class="bi bi-info-circle me-2" style="color:var(--primary);"></i>Informations du compte
                </h6>
                <div style="font-size:.875rem;">
                    <!-- Email de connexion -->
                    <div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--border);">
                        <span style="color:var(--text-muted);">Email</span>
                        <strong>alice.dubois@email.fr</strong>
                    </div>
                    <!-- Date d'inscription -->
                    <div class="d-flex justify-content-between py-2" style="border-bottom:1px solid var(--border);">
                        <span style="color:var(--text-muted);">Membre depuis</span>
                        <strong>01/01/2026</strong>
                    </div>
                    <!-- Clause légale acceptée ou non -->
                    <div class="d-flex justify-content-between py-2">
                        <span style="color:var(--text-muted);">Clause légale</span>
                        <strong style="color:#2e7d32;"> Acceptée</strong>
                    </div>
                </div>
            </div>

            <!-- Historique des dernières commandes -->
            <div class="card-omnes p-4">
                <h6 style="font-weight:700;margin-bottom:16px;">
                    <i class="bi bi-bag-check me-2" style="color:var(--primary);"></i>Dernières commandes
                </h6>
                <!-- Rempli dynamiquement par JS -->
                <div id="orderList"></div>
            </div>
        </div>
    </div>
</div>

<div class="mt-5"></div>

<!-- 
     SCRIPTS : Commandes + Sauvegarde profil
 -->
<script>
/**
 * Historique des 3 dernières commandes.
 * statusColor : [couleur de fond, couleur du texte] du badge statut.
 */
const orders = [
    {id:42, montant:'1 425 €', date:'08/03/2026', status:'expediee', statusColor:['#fff3e0','#e65100']},
    {id:38, montant:'55 €',    date:'01/03/2026', status:'livree',   statusColor:['#e8f5e9','#1b5e20']},
    {id:31, montant:'320 €',   date:'20/02/2026', status:'livree',   statusColor:['#e8f5e9','#1b5e20']},
];

/* Génération des lignes de commande */
const list = document.getElementById('orderList');
orders.forEach(o => {
    list.innerHTML += `
    <div class="d-flex justify-content-between align-items-center py-2 border-bottom" style="border-color:var(--border)!important;font-size:.85rem;">
        <div>
            <div style="font-weight:600;">#${o.id}</div>
            <div style="color:var(--text-muted);font-size:.75rem;">${o.date}</div>
        </div>
        <div class="text-end">
            <div class="price-display" style="font-size:.95rem;">${o.montant}</div>
            <!-- Badge statut de la commande -->
            <span style="background:${o.statusColor[0]};color:${o.statusColor[1]};padding:2px 10px;border-radius:50px;font-size:.7rem;font-weight:700;">${o.status}</span>
        </div>
    </div>`;
});

/**
 * saveProfile() — Feedback visuel après enregistrement du profil.
 * Le bouton devient vert pendant 2 secondes puis revient à son état initial.
 * En production : appeler PATCH /api/users/me avec les nouvelles données.
 */
function saveProfile() {
    const btn = event.target;
    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>Sauvegardé !';
    btn.style.background = '#4caf50';
    setTimeout(() => {
        btn.innerHTML = '<i class="bi bi-check me-2"></i>Enregistrer';
        btn.style.background = '';
    }, 2000);
}
</script>

<!-- Footer partagé -->
<script>renderFooter();</script>
</body>
</html>
