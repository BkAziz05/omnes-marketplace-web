<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- 
         login.html — Page de connexion
         Formulaire de connexion avec sélection du rôle
         (Acheteur / Vendeur / Admin).
     -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Omnes MarketPlace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts pour la page de connexion (auto-contenu, pas de layout.js) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /*  Variables CSS  */
        :root {
            --primary:      #0e8c8c;
            --primary-dark: #0a6e6e;
            --primary-pale: #e0f5f5;
            --accent:       #f7a800;
        }

        /*  Corps centré sur fond dégradé  */
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /*  Carte de connexion  */
        .login-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(10,70,70,.35);
            width: 100%;
            max-width: 480px;
        }

        /*  En-tête de la carte (fond dégradé)  */
        .login-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 36px 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        /* Cercle décoratif en arrière-plan du header */
        .login-header::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,.06);
        }
        .login-header h1 {
            font-family: 'Playfair Display', serif;
            color: white;
            font-size: 1.6rem;
            margin: 12px 0 4px;
        }
        .login-header p {
            color: rgba(255,255,255,.75);
            font-size: .9rem;
            margin: 0;
        }

        /*  Corps du formulaire  */
        .login-body { padding: 36px 40px 40px; }

        /*  Champs de formulaire Bootstrap flottants  */
        .form-floating .form-control {
            border: 1.5px solid #e0ecec;
            border-radius: 12px;
            font-size: .9rem;
        }
        .form-floating .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14,140,140,.12);
        }

        /*  Onglets de sélection du rôle  */
        .role-tabs {
            display: flex;
            background: #f0f7f7;
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }
        .role-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 9px;
            cursor: pointer;
            font-size: .82rem;
            font-weight: 600;
            color: #5a7a7a;
            transition: all .2s;
            border: none;
            background: none;
        }
        .role-tab.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(14,140,140,.15);
        }

        /*  Bouton de connexion principal  */
        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            transition: all .2s;
            margin-top: 8px;
            cursor: pointer;
        }
        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(14,140,140,.3);
        }

        /*  Séparateur "ou"  */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #aaa;
            font-size: .85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
    </style>
</head>
<body>

<!-- 
     CARTE DE CONNEXION
     Page isolée sans navbar/footer (layout.js non utilisé).
 -->
<div class="login-card">

    <!-- En-tête avec logo texte stylisé -->
    <div class="login-header">
        <!-- Logo texte "OmnesMarketPlace" en version login -->
        <div style="display:flex;align-items:center;justify-content:center;margin-bottom:8px;">
            <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.6rem;color:white;letter-spacing:-0.5px;">Omnes</span>
            <span style="font-family:'DM Sans',sans-serif;font-weight:300;font-size:1.2rem;color:rgba(255,255,255,.7);letter-spacing:1px;text-transform:uppercase;margin-left:5px;">MarketPlace</span>
        </div>
        <h1>Connexion</h1>
        <p>Bienvenue sur Omnes MarketPlace</p>
    </div>

    <div class="login-body">
        <!-- Sélection du rôle avant connexion -->
        <p style="font-size:.82rem;color:#7a9a9a;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Je suis</p>
        <div class="role-tabs mb-4">
            <!-- Onglet Acheteur (actif par défaut) -->
            <button class="role-tab active" onclick="setRole(this,'acheteur')"> Acheteur</button>
            <!-- Onglet Vendeur -->
            <button class="role-tab" onclick="setRole(this,'vendeur')"> Vendeur</button>
            <!-- Onglet Administrateur -->
            <button class="role-tab" onclick="setRole(this,'admin')"> Admin</button>
        </div>

        <!-- Champ email avec label flottant Bootstrap -->
        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="email" placeholder="Email" value="alice.dubois@email.fr">
            <label for="email"><i class="bi bi-envelope me-1"></i>Adresse email</label>
        </div>

        <!-- Champ mot de passe avec bouton afficher/masquer -->
        <div class="form-floating mb-3 position-relative">
            <input type="password" class="form-control" id="password" placeholder="Mot de passe" value="Acheteur1234!">
            <label for="password"><i class="bi bi-lock me-1"></i>Mot de passe</label>
            <!-- Bouton toggle visibilité du mot de passe -->
            <button onclick="togglePass()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#aaa;" title="Afficher/masquer le mot de passe">
                <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
        </div>

        <!-- Bouton de connexion — redirige vers l'accueil en démo -->
        <button class="btn-login" onclick="window.location='index.html'">
            Se connecter <i class="bi bi-arrow-right ms-2"></i>
        </button>

        <!-- Séparateur -->
        <div class="divider">ou</div>

        <!-- Lien vers la page d'inscription -->
        <div class="text-center">
            <p style="color:#888;font-size:.875rem;margin:0;">Pas encore de compte ?
                <a href="register.html" style="color:var(--primary);font-weight:600;text-decoration:none;">Créer un compte</a>
            </p>
        </div>
        <!-- Lien retour à l'accueil -->
        <div class="text-center mt-3">
            <a href="index.html" style="color:#aaa;font-size:.8rem;text-decoration:none;">
                <i class="bi bi-arrow-left me-1"></i>Retour à l'accueil
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/**
 * setRole(btn, role) — Change le rôle sélectionné.
 * Met à jour les onglets et pré-remplit l'email + mot de passe.
 * En production : ce serait géré par le backend selon le compte.
 *
 * @param {HTMLElement} btn  - Bouton d'onglet cliqué
 * @param {string}      role - Rôle : 'acheteur' | 'vendeur' | 'admin'
 */
function setRole(btn, role) {
    /* Réinitialisation des onglets */
    document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    /* Emails de démonstration par rôle */
    const emails = {
        acheteur: 'alice.dubois@email.fr',
        vendeur:  'marc.martin@email.fr',
        admin:    'admin@omnes-marketplace.fr',
    };
    /* Mots de passe de démonstration par rôle */
    const passes = {
        acheteur: 'Acheteur1234!',
        vendeur:  'Vendeur1234!',
        admin:    'Admin1234!',
    };
    document.getElementById('email').value    = emails[role];
    document.getElementById('password').value = passes[role];
}

/**
 * togglePass() — Bascule l'affichage du mot de passe.
 * Change le type du champ entre "password" et "text".
 */
function togglePass() {
    const p = document.getElementById('password');
    const i = document.getElementById('eyeIcon');
    p.type   = p.type === 'password' ? 'text' : 'password';
    i.className = p.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
