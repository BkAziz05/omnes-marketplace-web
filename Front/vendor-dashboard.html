<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- 
         vendor-dashboard.html — Espace vendeur
         Tableau de bord avec stats de vente et gestion
         des articles publiés par le vendeur.
     -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Vendeur — Omnes MarketPlace</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts : Playfair Display + DM Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /*  Variables CSS globales  */
        :root {
            --primary:       #0e8c8c;
            --primary-dark:  #0a6e6e;
            --primary-pale:  #e0f5f5;
            --accent:        #f7a800;
        }

        /*  Reset box-model  */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /*  Corps de page  */
        body { font-family: 'DM Sans', sans-serif; background: #f0f5f5; }

        /*  SIDEBAR VENDEUR  */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 240px;
            height: 100vh;
            background: white;
            border-right: 1px solid #e0ecec;
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(14,140,140,.08);
        }

        /* En-tête sidebar : logo + nom du vendeur */
        .sb-brand {
            padding: 20px;
            border-bottom: 1px solid #e0ecec;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sb-brand .logo {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.1rem;
        }

        /* Navigation de la sidebar */
        .sb-nav { flex: 1; padding: 12px; overflow-y: auto; }
        .sb-nav a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            color: #5a7a7a; text-decoration: none;
            font-size: .875rem; border-radius: 8px;
            transition: all .2s; margin-bottom: 2px;
        }
        .sb-nav a:hover, .sb-nav a.active {
            background: var(--primary-pale);
            color: var(--primary-dark);
            font-weight: 600;
        }
        .sb-nav a i { font-size: 1rem; width: 18px; }

        /* Titres de section dans la sidebar */
        .sb-nav .sb-section {
            padding: 12px 12px 4px;
            font-size: .68rem; color: #aaa;
            text-transform: uppercase; letter-spacing: .8px;
        }

        /*  ZONE PRINCIPALE  */
        .main { margin-left: 240px; min-height: 100vh; }

        /* Barre de top */
        .topbar {
            background: white;
            padding: 14px 28px;
            border-bottom: 1px solid #e0ecec;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 50;
        }

        /* Zone de contenu avec padding */
        .content { padding: 28px; }

        /*  CARTES STATISTIQUES  */
        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: 0 2px 10px rgba(14,140,140,.07);
        }
        .stat-icon {
            width: 44px; height: 44px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem; margin-bottom: 10px;
        }
        .stat-val {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem; font-weight: 700; color: #1e3535;
        }
        .stat-lbl { color: #5a7a7a; font-size: .78rem; margin-top: 2px; }

        /*  LIGNES ARTICLE  */
        .article-row {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 1px 8px rgba(14,140,140,.06);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 14px;
            transition: box-shadow .2s;
        }
        .article-row:hover { box-shadow: 0 4px 16px rgba(14,140,140,.12); }

        /* Badges de mode et statut article */
        .mode-badge { font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:50px; text-transform:uppercase; letter-spacing:.4px; display:inline-block; }
        .badge-immediat    { background:#e8f5e9; color:#2e7d32; }
        .badge-negotiation { background:#fff3e0; color:#e65100; }
        .badge-enchere     { background:#fce4ec; color:#c62828; }
        .badge-disponible  { background:var(--primary-pale); color:var(--primary-dark); }
        .badge-vendu       { background:#e8f5e9; color:#2e7d32; }
        .badge-en_cours    { background:#fff3e0; color:#e65100; }
    </style>
</head>
<body>

<!-- 
     SIDEBAR — Navigation vendeur
 -->
<div class="sidebar">
    <!-- En-tête : logo + pseudo vendeur -->
    <div class="sb-brand">
        <div class="logo"><i class="bi bi-shop"></i></div>
        <div>
            <div style="font-family:'Playfair Display',serif;color:#1e3535;font-size:.95rem;font-weight:600;">MarcBijoux</div>
            <small style="color:#5a7a7a;font-size:.72rem;">Espace vendeur</small>
        </div>
    </div>

    <!-- Liens de navigation -->
    <nav class="sb-nav">
        <div class="sb-section">Boutique</div>
        <a href="vendor-dashboard.html" class="active"><i class="bi bi-grid"></i>Mes articles</a>
        <a href="#"><i class="bi bi-plus-circle"></i>Publier un article</a>

        <div class="sb-section">Ventes</div>
        <a href="negotiation.html">
            <i class="bi bi-chat-dots"></i>Négociations
            <!-- Badge compteur de négociations actives -->
            <span style="background:#fff3e0;color:#e65100;padding:1px 8px;border-radius:50px;font-size:.7rem;margin-left:auto;">2</span>
        </a>
        <a href="auction.html"><i class="bi bi-trophy"></i>Enchères</a>

        <div class="sb-section">Compte</div>
        <a href="account.html"><i class="bi bi-person"></i>Mon profil</a>
        <a href="index.html"><i class="bi bi-arrow-left"></i>Retour au site</a>
    </nav>

    <!-- Bouton déconnexion en bas de sidebar -->
    <div style="padding:16px 12px;border-top:1px solid #e0ecec;">
        <a href="login.html" style="display:flex;align-items:center;gap:8px;color:#ef5350;text-decoration:none;font-size:.8rem;padding:8px 12px;border-radius:8px;background:#fce8e8;">
            <i class="bi bi-box-arrow-right"></i>Déconnexion
        </a>
    </div>
</div>

<!-- 
     ZONE PRINCIPALE
 -->
<div class="main">

    <!-- Barre supérieure (topbar) -->
    <div class="topbar">
        <span style="font-weight:700;color:#1e3535;">Espace Vendeur</span>
        <div style="display:flex;gap:8px;align-items:center;">
            <!-- Confirmation publication -->
            <span style="background:#e8f5e9;color:#2e7d32;padding:6px 16px;border-radius:50px;font-size:.8rem;font-weight:600;">
                <i class="bi bi-check-circle me-1"></i>Article publié !
            </span>
            <!-- Bouton publier un nouvel article -->
            <a href="#" class="btn btn-sm" style="background:var(--primary);color:white;border-radius:50px;padding:7px 16px;font-weight:600;text-decoration:none;">
                <i class="bi bi-plus me-1"></i>Publier
            </a>
        </div>
    </div>

    <!-- Contenu -->
    <div class="content">

        <!--  GRILLE STATS  remplie par JS -->
        <div class="row g-3 mb-4" id="statsGrid"></div>

        <!--  LISTE DES ARTICLES  -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h5 style="font-family:'Playfair Display',serif;margin:0;">Mes articles (12)</h5>
            <a href="#" class="btn btn-sm" style="background:var(--primary);color:white;border-radius:50px;padding:8px 18px;font-weight:600;text-decoration:none;">
                <i class="bi bi-plus me-1"></i>Publier un article
            </a>
        </div>

        <!-- Lignes articles — remplies par JS -->
        <div id="articleList"></div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- 
     SCRIPTS : Stats + Génération de la liste d'articles
 -->
<script>
/**
 * Données des statistiques du vendeur.
 * À remplacer par un appel API GET /api/vendor/stats.
 */
const stats = [
    {bg:'#e0f5f5',  ic:'var(--primary)',      icon:'bi-box-seam',       val:'12',       lbl:'Total articles'},
    {bg:'#e8f5e9',  ic:'#2e7d32',             icon:'bi-bag-check',      val:'8',        lbl:'Articles vendus'},
    {bg:'#fff3e0',  ic:'#e65100',             icon:'bi-chat-dots',      val:'2',        lbl:'Négociations actives'},
    {bg:'#e0f5f5',  ic:'var(--primary-dark)', icon:'bi-currency-euro',  val:'3 240 €',  lbl:'Revenus estimés'},
];

/* Génération des cartes statistiques */
const sg = document.getElementById('statsGrid');
stats.forEach(s => {
    sg.innerHTML += `
    <div class="col-6 col-xl-3">
        <div class="stat-card">
            <div class="stat-icon" style="background:${s.bg};">
                <i class="bi ${s.icon}" style="color:${s.ic};"></i>
            </div>
            <div class="stat-val">${s.val}</div>
            <div class="stat-lbl">${s.lbl}</div>
        </div>
    </div>`;
});

/**
 * Liste des articles publiés par le vendeur.
 * Champ "img" : chemin de l'image réelle (à remplir plus tard).
 * Statuts : disponible | vendu | en_cours
 */
const articles = [
    {nom:'Bague or 18 carats',         cat:'Bijoux & Montres', prix:'200 €', mode:'enchere',     status:'disponible', img:''},
    {nom:'Collier diamants',            cat:'Bijoux & Montres', prix:'450 €', mode:'enchere',     status:'disponible', img:''},
    {nom:'Montre Tissot vintage',       cat:'Bijoux & Montres', prix:'180 €', mode:'negotiation', status:'en_cours',   img:''},
    {nom:'Bracelet argent artisanal',   cat:'Bijoux & Montres', prix:'55 €',  mode:'immediat',    status:'vendu',      img:''},
    {nom:'Pendentif émeraude',          cat:'Bijoux & Montres', prix:'320 €', mode:'enchere',     status:'disponible', img:''},
    {nom:"Boucles d'oreilles perles",   cat:'Bijoux & Montres', prix:'85 €',  mode:'immediat',    status:'disponible', img:''},
];

/* Libellés des modes */
const modeLabels = { immediat:'Direct', negotiation:'Négo', enchere:'Enchère' };

const al = document.getElementById('articleList');

articles.forEach(a => {
    /**
     * IMAGE : Si a.img est défini, afficher <img>.
     * Sinon, afficher le placeholder avec le nom du produit.
     */
    const imageHTML = a.img
        ? `<img src="${a.img}" alt="${a.nom}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;">`
        : `<div style="width:60px;height:60px;background:linear-gradient(135deg,#1a2e2e,#0e8c8c);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;">
               <i class="bi bi-camera" style="color:rgba(255,255,255,.5);font-size:.9rem;"></i>
               <span style="color:rgba(255,255,255,.5);font-size:.45rem;text-align:center;line-height:1.2;padding:0 3px;">${a.nom.substring(0,15)}</span>
           </div>`;

    al.innerHTML += `
    <div class="article-row">
        ${imageHTML}
        <!-- Infos article -->
        <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.nom}</div>
            <div style="color:#5a7a7a;font-size:.78rem;">${a.cat}</div>
        </div>
        <!-- Badges mode + statut -->
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span class="mode-badge badge-${a.mode}">${modeLabels[a.mode]}</span>
            <span class="mode-badge badge-${a.status}">${a.status.replace('_',' ')}</span>
        </div>
        <!-- Prix -->
        <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--primary-dark);min-width:80px;text-align:right;">${a.prix}</div>
        <!-- Actions : modifier, photos, supprimer -->
        <div style="display:flex;gap:6px;margin-left:8px;">
            <button class="btn btn-sm" style="background:var(--primary-pale);color:var(--primary-dark);border-radius:8px;padding:6px 10px;border:none;" title="Modifier l'article">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm" style="background:#fff3e0;color:#e65100;border-radius:8px;padding:6px 10px;border:none;" title="Gérer les photos">
                <i class="bi bi-images"></i>
            </button>
            <button onclick="this.closest('.article-row').remove()" class="btn btn-sm" style="background:#fce8e8;color:#c62828;border-radius:8px;padding:6px 10px;border:none;" title="Supprimer l'article">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>`;
});
</script>
</body>
</html>
